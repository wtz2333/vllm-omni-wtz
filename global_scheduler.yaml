server:
  host: 0.0.0.0
  port: 8089
  request_timeout_s: 600
  instance_health_check_interval_s: 5.0
  instance_health_check_timeout_s: 1.0

scheduler:
  tie_breaker: random
  ewma_alpha: 0.2

policy:
  baseline:
    algorithm: fcfs

instances:
  - id: worker-gpu0
    endpoint: http://127.0.0.1:8001
    launch:
      executable: vllm
      model: Qwen/Qwen-Image
      args:
        - --omni
        - --port
        - "8001"
        - --max-concurrency
        - "100"
        - --ulysses-degree
        - "1"
        - --cfg-parallel-size
        - "1"
      env:
        CUDA_VISIBLE_DEVICES: "0"
    stop:
      executable: pkill
      args:
        - -f
        - "vllm serve Qwen/Qwen-Image --port 8001"

  - id: worker-gpu1
    endpoint: http://127.0.0.1:8002
    launch:
      executable: vllm
      model: Qwen/Qwen-Image
      args:
        - --omni
        - --port
        - "8002"
        - --max-concurrency
        - "100"
        - --ulysses-degree
        - "1"
        - --cfg-parallel-size
        - "1"
      env:
        CUDA_VISIBLE_DEVICES: "1"
    stop:
      executable: pkill
      args:
        - -f
        - "vllm serve Qwen/Qwen-Image --port 8002"
