server:
  host: 0.0.0.0
  port: 8089
  request_timeout_s: 600
  instance_health_check_interval_s: 5.0
  instance_health_check_timeout_s: 1.0

scheduler:
  tie_breaker: random
  ewma_alpha: 0.2

policy:
  baseline:
    algorithm: round_robin #short_queue_runtime
    runtime_profile_path: ./profile/instance_runtime_profile.sample.json

benchmark:
  worker_ids: [worker0]
  worker_ready_timeout_s: 600
  model: /data2/group_谈海生/mumura/models/Wan2.2-T2V-A14B-Diffusers
  task: t2v
  dataset: trace
  dataset_path: /home/mumura/omni/vllm-omni/benchmarks/dataset/cogvideox_trace_steps_30_40_50.txt
  max_concurrency: 20
  warmup_requests: 1
  warmup_num_inference_steps: 1
  output_file: logs/global_scheduler_benchmark_metrics.json
  auto_stop: true

instances:
  - id: worker0
    endpoint: http://127.0.0.1:8001
    instance_type: wan
    launch:
      executable: vllm
      model: /data2/group_谈海生/mumura/models/Wan2.2-T2V-A14B-Diffusers
      args:
        - --omni
        - --ulysses-degree
        - "4"
        - --cfg-parallel-size
        - "2"
        - --use-hsdp
        - --num-weight-load-threads
        - "4"
      env:
        CUDA_VISIBLE_DEVICES: "0,1,2,3,4,5,6,7"
    stop:
      executable: pkill
      args:
        - -f
        - "vllm serve /data2/group_谈海生/mumura/models/Wan2.2-T2V-A14B-Diffusers --port {endpoint_port}"
